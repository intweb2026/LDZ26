<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <!-- <meta name="robots" content="noindex,nofollow"> -->
  <meta name="robots" content="index,follow">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />

  <script>window.__originalOpen = window.open.bind(window);</script>
  <!-- Google Tag Manager (async – does not block render) -->
  <script>(function (w, d, s, l, i) {
      w[l] = w[l] || []; w[l].push({
        'gtm.start': new Date().getTime(), event: 'gtm.js'
      }); var f = d.getElementsByTagName(s)[0],
        j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src =
          'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
    })(window, document, 'script', 'dataLayer', 'GTM-MV56MLWN');</script>
  <!-- End Google Tag Manager -->

  <!-- Preconnect to critical origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Google Fonts – async load prevents render blocking, display=swap prevents FOIT -->
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">
  </noscript>

  <!-- Font Awesome – loaded non-render-blocking via media trick -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </noscript>

  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
</head>

<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MV56MLWN" height="0" width="0"
      style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <div id="google_translate_element"></div>

  <!-- reCAPTCHA – async defer to avoid blocking -->
  <script async defer
    src="https://www.google.com/recaptcha/api.js?render=6LcXWA0tAAAAAJzXEbSWf8y9VOpO0xZC52hgEaFG"></script>

  <!-- Google Translate – deferred so it never blocks render -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,fr,de,es,pt,ru,sv',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }
  </script>
  <script type="text/javascript" defer
    src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <!-- HubSpot – already async defer -->
  <script type="text/javascript" id="hs-script-loader" async defer src="//js.hs-scripts.com/4000965.js"></script>
</body>

</html>
